<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu Purchase Prediction</title>
    <style>
        :root {
            --bg: #040611;
            --panel: rgba(13, 24, 45, 0.82);
            --panel-border: rgba(255, 255, 255, 0.14);
            --text: #f5f9ff;
            --muted: #a0b0cd;
            --accent: #f9c26b;
            --accent-soft: rgba(249, 194, 107, 0.24);
            --glow-red: #ff4c5b;
            --glow-gold: #ffcd6b;
            --glow-white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, #14203d 0%, #05080f 40%, #020305 100%);
        }

        body {
            overflow-x: hidden;
            position: relative;
            background-color: #020305;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 2px, transparent 2px);
            background-size: 80px 80px;
            opacity: 0.35;
            pointer-events: none;
            z-index: -3;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }

        .background__glow {
            position: absolute;
            filter: blur(120px);
            opacity: 0.7;
        }

        .background__glow--left {
            width: 520px;
            height: 520px;
            left: -120px;
            top: 8%;
            background: radial-gradient(circle, rgba(255, 76, 91, 0.7) 0%, transparent 55%);
        }

        .background__glow--right {
            width: 620px;
            height: 620px;
            right: -180px;
            bottom: -80px;
            background: radial-gradient(circle, rgba(255, 205, 107, 0.65) 0%, transparent 48%);
        }

        .decor {
            position: fixed;
            inset: 0;
            pointer-events: none;
            perspective: 1200px;
            z-index: -1;
        }

        .decor__model {
            position: absolute;
            top: 52%;
            left: 50%;
            width: 420px;
            height: 420px;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(18deg);
            opacity: 0.94;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            margin: 5rem auto 4rem;
            padding: 2.3rem 2rem 3.2rem;
            background: rgba(11, 21, 38, 0.86);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            overflow: hidden;
        }

        .bulb-shell {
            position: absolute;
            inset: auto 50% 1.2rem;
            width: 360px;
            height: 420px;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: -1;
        }

        .bulb-glow {
            position: absolute;
            inset: 0;
            border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
            background: radial-gradient(circle at 50% 28%, rgba(255,255,255,0.95) 0%, rgba(255,205,107,0.30) 18%, rgba(255,76,91,0.16) 35%, transparent 65%);
            filter: blur(26px);
            opacity: 0.95;
            transform: translateY(-8%);
            mix-blend-mode: screen;
        }

        .bulb-body {
            position: absolute;
            left: 50%;
            top: 46%;
            width: 240px;
            height: 280px;
            transform: translate(-50%, -50%);
            border-radius: 42% 42% 52% 52% / 48% 48% 52% 52%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 0 70px rgba(255,255,255,0.12), 0 0 80px rgba(255,205,107,0.08);
            backdrop-filter: blur(18px);
        }

        .bulb-core {
            position: absolute;
            left: 50%;
            top: 34%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.95) 0%, rgba(255,205,107,0.24) 45%, rgba(255,76,91,0.08) 72%, transparent 88%);
            box-shadow: 0 0 50px rgba(255,205,107,0.22), 0 0 90px rgba(255,76,91,0.14);
        }

        .bulb-ring {
            position: absolute;
            left: 50%;
            top: 36%;
            width: 172px;
            height: 172px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 0 40px rgba(255,205,107,0.15);
        }

        .glow-on .bulb-glow {
            background: radial-gradient(circle at 50% 28%, rgba(255,255,255,0.95) 0%, rgba(255,205,107,0.45) 18%, rgba(255,76,91,0.35) 35%, rgba(255,205,107,0.14) 55%, transparent 75%);
            filter: blur(32px);
        }

        .glow-on .bulb-core {
            box-shadow: 0 0 80px rgba(255,205,107,0.34), 0 0 120px rgba(255,76,91,0.22);
        }

        .decor__sphere {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.08) 30%, transparent 70%);
            box-shadow: inset 0 0 40px rgba(255,255,255,0.14), 0 0 50px rgba(255, 255, 255, 0.08);
            animation: float 8s ease-in-out infinite;
        }

        .decor__ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.12);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.08);
            transform: rotateX(65deg);
            animation: spin 14s linear infinite;
        }

        .decor__cube {
            position: absolute;
            inset: 22% 12%;
            transform-style: preserve-3d;
            transform: rotateX(45deg) rotateY(25deg);
            animation: drift 12s ease-in-out infinite;
        }

        .decor__cube span {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 24px rgba(255,255,255,0.06);
            transform-origin: center;
        }

        .decor__cube span:nth-child(1) { transform: rotateY(0deg) translateZ(70px); }
        .decor__cube span:nth-child(2) { transform: rotateY(90deg) translateZ(70px); }
        .decor__cube span:nth-child(3) { transform: rotateY(180deg) translateZ(70px); }
        .decor__cube span:nth-child(4) { transform: rotateY(270deg) translateZ(70px); }
        .decor__cube span:nth-child(5) { transform: rotateX(90deg) translateZ(70px); }
        .decor__cube span:nth-child(6) { transform: rotateX(-90deg) translateZ(70px); }

        .decor__panel {
            position: absolute;
            width: 180px;
            height: 90px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateY(38deg) translateZ(-90px);
            border-radius: 26px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.05);
        }

        .glow-on .decor__sphere {
            box-shadow:
                inset 0 0 70px rgba(255, 255, 255, 0.9),
                0 0 120px rgba(255, 76, 91, 0.6),
                0 0 180px rgba(255, 205, 107, 0.45),
                0 0 250px rgba(255, 255, 255, 0.18);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95) 0%, rgba(255,76,91,0.24) 28%, rgba(255,205,107,0.12) 55%, transparent 82%);
        }

        .glow-on .decor__ring {
            box-shadow:
                0 0 80px rgba(255,76,91,0.9),
                0 0 120px rgba(255,205,107,0.75),
                0 0 180px rgba(255,255,255,0.28);
        }

        .glow-on .decor__cube span,
        .glow-on .decor__panel {
            box-shadow: 0 0 60px rgba(255,205,107,0.24);
        }

        .container {
            position: relative;
            max-width: 520px;
            margin: 5rem auto 4rem;
            padding: 2.3rem 2rem 2.2rem;
            background: rgba(11, 21, 38, 0.86);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.4rem;
        }

        .switch-panel {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .switch {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
        }

        .switch input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-track {
            width: 58px;
            height: 30px;
            border-radius: 999px;
            background: rgba(255,255,255,0.15);
            position: relative;
            transition: background 0.25s ease;
        }

        .switch-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f8f9ff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.18);
            transition: transform 0.25s ease, background 0.25s ease;
        }

        .switch input:checked + .switch-track {
            background: linear-gradient(135deg, rgba(255,76,91,0.9), rgba(255,205,107,0.9));
        }

        .switch input:checked + .switch-track .switch-thumb {
            transform: translateX(28px);
            background: #fff;
        }

        .switch-label {
            min-width: 30px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.78rem;
            color: var(--accent);
        }

        .hero h2 {
            margin: 0 0 0.8rem;
            font-size: clamp(2rem, 4vw, 2.8rem);
            letter-spacing: -0.04em;
            line-height: 1.05;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            max-width: 44rem;
        }

        form {
            display: grid;
            gap: 1rem;
            margin-top: 1.6rem;
        }

        input {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            border-radius: 18px;
            padding: 1rem 1.1rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(255,205,107,0.8);
            box-shadow: 0 0 0 3px rgba(255,205,107,0.14);
            background: rgba(255,255,255,0.08);
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 1rem 1.4rem;
            color: #08101f;
            background: linear-gradient(135deg, #ffcd6b, #ff5a6f);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 18px 40px rgba(255, 93, 104, 0.2);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 24px 50px rgba(255, 93, 104, 0.28);
        }

        .result {
            margin-top: 1.8rem;
            padding: 1.4rem 1.4rem;
            border-radius: 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            line-height: 1.7;
        }

        .loading {
            display: none;
        }

        .social-share {
            position: fixed;
            right: 1.5rem;
            bottom: 1.5rem;
            display: flex;
            gap: 0.9rem;
            z-index: 1;
        }

        .social-share a {
            display: inline-flex;
            width: 44px;
            height: 44px;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: var(--text);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .social-share a:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.12);
        }

        @keyframes float {
            0%, 100% { transform: translateY(-4px); }
            50% { transform: translateY(6px); }
        }

        @keyframes spin {
            0% { transform: rotateX(65deg) rotateZ(0deg); }
            100% { transform: rotateX(65deg) rotateZ(360deg); }
        }

        @keyframes drift {
            0%, 100% { transform: rotateX(45deg) rotateY(25deg) translateY(0); }
            50% { transform: rotateX(45deg) rotateY(25deg) translateY(-12px); }
        }

        @media (max-width: 640px) {
            .container { margin: 3rem 1rem 2rem; padding: 1.8rem 1.4rem; }
            .social-share { right: 1rem; bottom: 1rem; }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const lampToggle = document.getElementById('lampToggle');
            const lampStatus = document.getElementById('lampStatus');
            const predictForm = document.getElementById('predictForm');

            if (lampToggle) {
                lampToggle.addEventListener('change', function() {
                    document.body.classList.toggle('glow-on', this.checked);
                    if (lampStatus) {
                        lampStatus.textContent = this.checked ? 'On' : 'Off';
                    }
                });
            }

            if (predictForm) {
                predictForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    const features = [
                        parseFloat(document.getElementById('f1').value),
                        parseFloat(document.getElementById('f2').value),
                        document.getElementById('f3').value,
                        parseFloat(document.getElementById('f4').value),
                        parseFloat(document.getElementById('f5').value),
                        parseFloat(document.getElementById('f6').value)
                    ];

                    try {
                        const response = await fetch('/predict', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ features })
                        });

                        const result = await response.json();
                        const resultElement = document.getElementById('result');

                        if (result.prediction !== undefined) {
                            resultElement.innerText = `Prediction: ${result.prediction} (accuracy: ${result.accuracy || 'N/A'}%)`;
                        } else {
                            resultElement.innerText = `Error: ${result.error || 'Unknown error'}`;
                        }
                    } catch (error) {
                        document.getElementById('result').innerText = `Error: ${error.message || 'Unable to fetch prediction.'}`;
                    }
                });
            }
        });
    </script>
</head>

    <div class="container">
            <div class="toolbar">
                <div class="switch-panel">
                    <span>3D Glow</span>
                    <label class="switch">
                        <input id="lampToggle" type="checkbox">
                        <span class="switch-track"><span class="switch-thumb"></span></span>
                    </label>
                    <span class="switch-label" id="lampStatus">Off</span>
                </div>
            </div>

            <div class="bulb-shell" aria-hidden="true">
                <div class="bulb-glow"></div>

                <input type="text" id="f3" placeholder="Education level" required>
                <input type="number" id="f4" placeholder="Hours per week" required>
                <input type="number" id="f5" placeholder="Annual Income" required>
